services:
  - type: web
    name: smart-supply-chain-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: MOVEMENT_ENGINE_ENABLED
        value: "true"
      - key: MOVEMENT_TIME_SCALE
        value: "1"
      - key: MOVEMENT_TICK_SECONDS
        value: "10"
      - key: MOVEMENT_MAX_ELAPSED_SECONDS
        value: "15"
      - key: MOVEMENT_NODE_DWELL_HOURS
        value: "0.25"
      - key: WEATHER_DISRUPTION_THRESHOLD
        value: "0.5"
      - key: NEWS_DISRUPTION_RADIUS_DEFAULT_KM
        value: "15"
      - key: FRONTEND_ORIGIN_REGEX
        value: "https://.*\\.vercel\\.app"
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
